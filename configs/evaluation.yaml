quality_gates:
  f1_macro_min: 0.35
  mcc_min: 0.05
  hit_rate_min: 0.50
  max_signal_concentration: 0.80   # no single class > 80% of predictions

shap:
  background_sample_size: 100      # for KernelExplainer fallback
  top_n_features: 5                # per-prediction explanation

reports:
  output_dir: reports/evaluation
  append_mode: true
