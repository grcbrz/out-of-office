# LightGBM hyperparameters for the v1 production candidate.
# Defaults live in src/models/architectures/lightgbm.py — values here override
# them. Tune via experiment tracking; do not hardcode in source.

n_estimators: 400
learning_rate: 0.05
num_leaves: 31
max_depth: -1            # -1 = no constraint (num_leaves is the binding cap)
min_child_samples: 20
feature_fraction: 0.9
bagging_fraction: 0.8
bagging_freq: 5
reg_alpha: 0.0
reg_lambda: 0.1
random_seed: 42
n_jobs: -1
